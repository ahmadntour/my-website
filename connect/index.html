<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>تواصل معي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background: url('photo.jpg.jpg') no-repeat center center/cover;
  font-family:'Tajawal', sans-serif;
  position:relative;
  padding:24px;
}
body::before {
  content:'';
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.6); /* overlay غامق */
}
.container {
  position:relative;
  z-index:1;
  text-align:center;
  color:white;
  max-width:420px;
  width:100%;
  padding:48px 36px;
  background: rgba(22,22,24,0.85);
  border-radius:28px;
  border:1px solid rgba(255,255,255,0.08);
  animation: rise 0.8s cubic-bezier(0.16,1,0.3,1) both;
}
h1 {
  font-family:'Sora', sans-serif;
  font-size:28px;
  margin-bottom:30px;
}
.btn {
  display:inline-block;
  padding:16px 30px;
  background:#25D366;
  color:white;
  text-decoration:none;
  font-size:18px;
  border-radius:10px;
  transition:0.3s;
  font-weight:600;
}
.btn:hover {
  background:#1ebe5d;
  transform: scale(1.05);
}
@keyframes rise {
  from { opacity:0; transform: translateY(28px) scale(0.98); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}
@media(max-width:460px){
  .container{padding:36px 22px; border-radius:22px;}
  h1{font-size:21px;}
}
</style>
</head>
<body>
  <div class="container">
    <h1>اضغط للتواصل</h1>
    <a class="btn" href="https://wa.me/963981410612?text=مرحبا%20أحمد،%20حابب%20نتواصل%20معك%20بخصوص%20شغل" target="_blank">
      تواصل عبر واتساب
    </a>
  </div>
</body>
</html>
