<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>

<title>أحمد ناطور</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
background: #0f0f10;
font-family: 'Tajawal', sans-serif;
padding: 24px;
}
body::before {
content: '';
position: fixed;
top: -200px;
left: 50%;
transform: translateX(-50%);
width: 700px;
height: 700px;
background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
pointer-events: none;
}
.card {
width: 100%;
max-width: 420px;
background: #161618;
border: 1px solid rgba(255,255,255,0.08);
border-radius: 28px;
padding: 48px 36px 40px;
position: relative;
overflow: hidden;
animation: rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
}
.card::before {
content: '';
position: absolute;
top: 0; left: 20%; right: 20%;
height: 1px;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
}
.avatar-section {
display: flex;
flex-direction: column;
align-items: center;
margin-bottom: 26px;
}
.avatar-ring {
width: 92px;
height: 92px;
border-radius: 50%;
padding: 2px;
background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.03));
margin-bottom: 18px;
}
.avatar-inner {
width: 100%;
height: 100%;
border-radius: 50%;
overflow: hidden;
display: flex;
align-items: center;
justify-content: center;
}
.avatar-inner img {
width: 100%;
height: 100%;
object-fit: cover;
border-radius: 50%;
display: block;
}
.name {
font-family: 'Sora', sans-serif;
font-size: 24px;
font-weight: 700;
color: #fff;
letter-spacing: -0.4px;
margin-bottom: 7px;
text-align: center;
}
.title {
font-size: 13px;
color: rgba(255,255,255,0.35);
text-align: center;
line-height: 1.65;
font-weight: 400;
}
.divider {
height: 1px;
background: rgba(255,255,255,0.06);
margin: 26px 0;
}
.bio {
font-size: 14px;
color: rgba(255,255,255,0.45);
line-height: 1.9;
text-align: center;
}
.bio strong {
color: rgba(255,255,255,0.72);
font-weight: 500;
}
.links {
display: flex;
flex-direction: row;
justify-content: space-between;
gap: 9px;
margin-top: 26px;
flex-wrap: wrap;
}
.link {
display: flex;
align-items: center;
gap: 8px;
background: rgba(255,255,255,0.04);
border: 1px solid rgba(255,255,255,0.07);
border-radius: 14px;
padding: 10px 12px;
text-decoration: none;
transition: background 0.2s, border-color 0.2s, transform 0.2s;
flex: 1;
min-width: 60px;
justify-content: center;
}
.link:hover {
background: rgba(255,255,255,0.07);
border-color: rgba(255,255,255,0.13);
transform: translateY(-2px);
}
.link-icon {
width: 34px;
height: 34px;
border-radius: 9px;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
}
.link-icon svg { width: 17px; height: 17px; }
.li { background: rgba(10,102,194,0.15); }
.ig { background: rgba(225,48,108,0.12); }
.em { background: rgba(255,255,255,0.06); }
.wa { background: rgba(37,211,102,0.11); }
.fb { background: rgba(24,119,242,0.15); }
.link-text { display:none; }
.arrow { display:none; }
.footer {
margin-top: 30px;
text-align: center;
font-size: 11px;
color: rgba(255,255,255,0.12);
}
@keyframes rise {
from { opacity: 0; transform: translateY(28px) scale(0.98); }
to   { opacity: 1; transform: translateY(0) scale(1); }
}
@media (max-width: 460px) {
.card { padding: 36px 22px 32px; border-radius: 22px; }
.name { font-size: 21px; }
}
</style>
</head>
