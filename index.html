    <meta property="og:title" content="أحمد ناطور | مستشار عقاري">
    <meta property="og:type" content="website">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0f10;
            font-family: 'Tajawal', sans-serif;
            padding: 24px;
        }
        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
            pointer-events: none;
        }
        .card {
            width: 100%;
            max-width: 420px;
            background: #161618;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            padding: 48px 36px 40px;
            position: relative;
            overflow: hidden;
            animation: rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
            text-align: center;
        }
        .avatar-ring {
            width: 92px;
            height: 92px;
            border-radius: 50%;
            padding: 2px;
            background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.03));
            margin: 0 auto 18px;
        }
        .avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
        }
        .avatar-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .name {
            font-family: 'Sora', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 7px;
        }
        .title {
            font-size: 13px;
            color: rgba(255,255,255,0.35);
            line-height: 1.65;
            margin-bottom: 20px;
        }
        /* زر حفظ جهة الاتصال - الإضافة الاحترافية */
        .save-contact {
            display: inline-block;
            width: 100%;
            background: #fff;
            color: #000;
            text-decoration: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 26px;
            transition: 0.3s;
        }
        .save-contact:hover { transform: translateY(-2px); opacity: 0.9; }

        .divider {
            height: 1px;
            background: rgba(255,255,255,0.06);
            margin: 0 0 26px 0;
        }
        .bio {
            font-size: 14px;
            color: rgba(255,255,255,0.45);
            line-height: 1.9;
            margin-bottom: 26px;
        }
        .bio strong { color: rgba(255,255,255,0.72); font-weight: 500; }
        
        .links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            transition: 0.2s;
        }
        .link:hover {
            background: rgba(255,255,255,0.07);
            transform: translateY(-2px);
        }
        .link svg { width: 20px; height: 20px; }
        
        /* ألوان الأيقونات */
        .li svg { stroke: #4A9EE8; }
        .ig svg { stroke: #E1306C; }
        .wa svg { stroke: #25D366; }
        .fb svg { stroke: #3B5998; }
        .em svg { stroke: rgba(255,255,255,0.6); }

        .footer { margin-top: 30px; font-size: 11px; color: rgba(255,255,255,0.12); }

        @keyframes rise {
            from { opacity: 0; transform: translateY(28px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>

<div class="card">
